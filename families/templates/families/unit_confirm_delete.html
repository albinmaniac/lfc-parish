{% extends "base.html" %}
{% block content %}

<style>
.delete-card {
  border-radius: 16px;
}
.warning-box {
  background: #fff3cd;
  border: 1px solid #ffeeba;
  border-radius: 10px;
  padding: 12px;
  font-size: 0.9rem;
}
</style>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="card delete-card shadow-sm p-4 text-center">

        <h4 class="text-danger mb-3">
          ⚠ Delete Family Unit
        </h4>

        <p>You are about to delete:</p>
        <h5 class="fw-bold">{{ object.name }}</h5>

        <div class="warning-box mt-3 mb-4">
          This action cannot be undone.  
          All families under this unit will lose unit reference.
        </div>

        <form method="post">
          {% csrf_token %}

          <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'unit_list' %}" class="btn btn-outline-secondary">
              Cancel
            </a>

            <button type="submit" class="btn btn-danger">
              Yes, Delete
            </button>
          </div>
        </form>

      </div>

    </div>
  </div>
</div>

{% endblock %}
