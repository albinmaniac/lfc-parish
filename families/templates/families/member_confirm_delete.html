{% extends 'base.html' %}
{% block title %}Delete Member{% endblock %}
{% block content %}

<div class="container mt-5 text-center">
  <div class="card shadow-sm p-4">
    <h3 class="text-danger">Delete Confirmation</h3>

    <p>
      Are you sure you want to delete
      <strong>{{ object.user }}</strong>?
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'family_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
