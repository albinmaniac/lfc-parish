{% extends "base.html" %}
{% block content %}

<style>
.delete-card {
  border-radius: 16px;
}

.delete-preview {
  max-height: 260px;
  object-fit: cover;
  border-radius: 12px;
}

.warning-box {
  background: #fff3cd;
  border: 1px solid #ffeeba;
  border-radius: 10px;
  padding: 12px;
  font-size: 0.9rem;
}
</style>

<div class="container mt-5">

  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="card delete-card shadow-sm p-4 text-center">

        <h4 class="mb-3 text-danger">
          ⚠ Delete Gallery Image
        </h4>

        <p class="mb-2">
          You are about to permanently delete:
        </p>

        <h5 class="mb-3 fw-bold">{{ object.title }}</h5>

        {% if object.image %}
          <img src="{{ object.image.url }}" 
               class="img-fluid delete-preview mb-3">
        {% endif %}

        <div class="warning-box mb-3">
          This action cannot be undone.
        </div>

        <form method="post">
          {% csrf_token %}

          <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'gallery' %}" class="btn btn-outline-secondary px-4">
              Cancel
            </a>

            <button type="submit" class="btn btn-danger px-4">
              Yes, Delete
            </button>
          </div>
        </form>

      </div>

    </div>
  </div>

</div>

{% endblock %}
