{% extends "base.html" %}
{% block content %}

<style>
  .form-wrapper {
    max-width: 750px;
    margin: 80px auto 60px; /* ✅ fixes navbar overlap */
    padding: 0 15px;
  }

  .form-card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    padding: 35px 32px;
    border: 1px solid #eee;
  }

  .form-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 25px;
    text-align: center;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
    color: #444;
  }

  .form-control {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.2s;
  }

  .form-control:focus {
    border-color: #991b1b;
    outline: none;
    box-shadow: 0 0 0 2px rgba(153,27,27,0.1);
  }

  textarea.form-control {
    resize: vertical;
    min-height: 100px;
  }

  .form-actions {
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn-save {
    background: #1c1917;
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 14px;
    transition: 0.25s;
  }

  .btn-save:hover {
    background: #991b1b;
  }

  .btn-back {
    text-decoration: none;
    font-size: 13px;
    color: #777;
  }

  .btn-back:hover {
    color: #991b1b;
  }

</style>

<div class="form-wrapper">

  <div class="form-card">

    <h2 class="form-title">
      {% if object %}Edit Event{% else %}Add Event{% endif %}
    </h2>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <small style="color:red;">{{ field.errors|striptags }}</small>
        {% endif %}
      </div>
      {% endfor %}

      <div class="form-actions">
        <a href="{% url 'event_list' %}" class="btn-back">
          ← Back
        </a>

        <button type="submit" class="btn-save">
          Save Event
        </button>
      </div>

    </form>

  </div>

</div>

{% endblock %}
